<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9c0;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9c0" />
      <stop offset="100%" style="stop-color:#5eead4" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Logo -->
  <text x="600" y="280" font-family="Space Grotesk, sans-serif" font-size="120" font-weight="700" fill="#fafafa" text-anchor="middle" letter-spacing="-2">Zero<tspan fill="#00d9c0">AI</tspan></text>
  
  <!-- Tagline -->
  <text x="600" y="360" font-family="Inter, sans-serif" font-size="32" font-weight="400" fill="rgba(250,250,250,0.65)" text-anchor="middle">Building AI at the Edge of Intelligence</text>
  
  <!-- Products -->
  <text x="600" y="450" font-family="JetBrains Mono, monospace" font-size="18" font-weight="500" fill="#00d9c0" text-anchor="middle" letter-spacing="2">MEETSIMUL • PREDMARKET • CRYPTOVAULT</text>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="80" fill="none" stroke="#00d9c0" stroke-width="1" opacity="0.2"/>
  <circle cx="1050" cy="480" r="120" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.15"/>
  
  <!-- Corner accents -->
  <path d="M 40 40 L 80 40 L 80 45 L 45 45 L 45 80 L 40 80 Z" fill="#00d9c0" opacity="0.6"/>
  <path d="M 1160 590 L 1120 590 L 1120 585 L 1155 585 L 1155 550 L 1160 550 Z" fill="#00d9c0" opacity="0.6"/>
</svg>